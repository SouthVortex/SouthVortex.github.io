window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const brand = params.get('brand');
    const title = document.getElementById('brandTitle');
    const list = document.getElementById('modelList');

    if (brand && carData[brand]) {
        title.innerText = brand.toUpperCase() + " MODELLERİ";
        list.innerHTML = ""; // İçeriği temizle
        carData[brand].forEach(car => {
            list.innerHTML += `
                <div class="model-card">
                    <img src="${car.img}" alt="${car.name}">
                    <div class="model-info">
                        <h4>${car.name}</h4>
                        <span>${car.type}</span>
                    </div>
                </div>
            `;
        });
    } else {
        title.innerText = "Model Bulunamadı";
        list.innerHTML = "<p style='color:white'>Lütfen katalogdan geçerli bir marka seçin.</p>";
    }
};
