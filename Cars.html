<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Araç Dünyası</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1e1e2f, #2c3e50);
      color: white;
    }

    header {
      text-align: center;
      padding: 25px;
      background: rgba(0,0,0,0.4);
    }

    nav {
      text-align: center;
      padding: 15px;
    }

    nav a {
      color: #00c3ff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      border-left: 4px solid #00c3ff;
      padding-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .detail-box {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      display: none;
      animation: fadeIn 0.5s ease;
      text-align: center;
    }

    .detail-box img {
      width: 300px;
      border-radius: 10px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      background: rgba(0,0,0,0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

  </style>
</head>
<body>

<header>
  <h1>Araç Dünyası</h1>
  <p>Modern Araç Tanıtım Sitesi</p>
</header>

<nav>
  <a href="#">Ana Sayfa</a>
  <a href="#markalar">Markalar</a>
  <a href="#kategoriler">Kategoriler</a>
</nav>

<div class="container">

  <section id="markalar">
    <h2>Markalar</h2>

    <div class="grid">

      <div class="card" onclick="showDetail('BMW lüks ve performans araçlarıyla bilinir.','https://images.unsplash.com/photo-1556189250-72ba954cfc2b')">
        <img src="https://images.unsplash.com/photo-1556189250-72ba954cfc2b">
        BMW
      </div>

      <div class="card" onclick="showDetail('Mercedes konfor ve prestij sunar.','https://images.unsplash.com/photo-1549924231-f129b911e442')">
        <img src="https://images.unsplash.com/photo-1549924231-f129b911e442">
        Mercedes
      </div>

      <div class="card" onclick="showDetail('Audi modern tasarım sunar.','https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
        Audi
      </div>

      <div class="card" onclick="showDetail('Tesla elektrikli araç lideridir.','https://images.unsplash.com/photo-1511391409281-6927c3f37e6e')">
        <img src="https://images.unsplash.com/photo-1511391409281-6927c3f37e6e">
        Tesla
      </div>

      <div class="card" onclick="showDetail('Toyota dayanıklılığı ile bilinir.','https://images.unsplash.com/photo-1502877338535-766e1452684a')">
        <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
        Toyota
      </div>

      <div class="card" onclick="showDetail('Honda ekonomik araçlar üretir.','https://images.unsplash.com/photo-1493238792000-8113da705763')">
        <img src="https://images.unsplash.com/photo-1493238792000-8113da705763">
        Honda
      </div>

      <div class="card" onclick="showDetail('Ford güçlü motorlarıyla bilinir.','https://images.unsplash.com/photo-1504215680853-026ed2a45def')">
        <img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def">
        Ford
      </div>

      <div class="card" onclick="showDetail('Hyundai modern ve uygun fiyatlıdır.','https://images.unsplash.com/photo-1549921296-3c0b1c1c3a0c')">
        <img src="https://images.unsplash.com/photo-1549921296-3c0b1c1c3a0c">
        Hyundai
      </div>

      <div class="card" onclick="showDetail('Volkswagen geniş model yelpazesi sunar.','https://images.unsplash.com/photo-1503376780353-7e6692767b70')">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
        Volkswagen
      </div>

      <div class="card" onclick="showDetail('Porsche spor araçlarıyla ünlüdür.','https://images.unsplash.com/photo-1503736334956-4c8f8e92946d')">
        <img src="https://images.unsplash.com/photo-1503736334956-4c8f8e92946d">
        Porsche
      </div>

    </div>

    <div id="detail" class="detail-box"></div>

  </section>

  <section id="kategoriler">
    <h2>Araç Kategorileri</h2>

    <div class="grid">
      <div class="card">Sedan</div>
      <div class="card">SUV</div>
      <div class="card">Hatchback</div>
      <div class="card">Elektrikli</div>
      <div class="card">Spor</div>
      <div class="card">Pickup</div>
      <div class="card">Minivan</div>
      <div class="card">Crossover</div>
      <div class="card">Coupe</div>
      <div class="card">Station Wagon</div>
    </div>

  </section>

</div>

<footer>
  <p>© 2026 Araç Dünyası</p>
</footer>

<script>
  function showDetail(text, img) {
    const box = document.getElementById('detail');
    box.style.display = 'block';
    box.innerHTML = `<p>${text}</p><img src="${img}">`;
  }
</script>

</body>
</html>
